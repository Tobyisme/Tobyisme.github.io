<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片预览</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }
        .header {
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
            color: #555;
        }
        .info-button {
            padding: 10px 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            text-decoration: none;
        }
        .photo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .photo {
            flex: 1 1 calc(20% - 10px);
            height: 150px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 8px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            text-align: center;
            max-width: 90%; /* 确保模态框内容不超出屏幕 */
        }
        .modal img {
            max-width: 100%;
            max-height: 80vh; /* 限制最大高度为视口高度 */
            border-radius: 8px;
        }
        .download {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: white;
            text-decoration: underline;
            font-size: 18px;
            padding: 10px;
            background: rgba(0, 0, 0, 10.5);
            border-radius: 5px;
        }
        .pagination {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-btn {
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .page-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .page-info {
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="header">此為預覽照片，方便尋找，點擊後有下載按鈕，可下載到畫質較高原照片</div>

<a href="https://drive.google.com/drive/folders/1FzMKtYQZNeHaZX8Haoks02tbvDXhYNSE?usp=sharing" class="info-button">雲端硬碟</a>

<div id="photo-grid" class="photo-grid"></div>
<div class="pagination">
    <button id="prev-btn" class="page-btn" disabled>上一頁</button>
    <span id="page-info" class="page-info"></span>
    <button id="next-btn" class="page-btn">下一頁</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <img id="modal-img" src="" alt="放大预览">
        <a id="download-link" class="download" href="#" target="_blank">下載</a>
    </div>
</div>

<script>
    const photosPerPage = 20;
    let currentPage = 1;
    let photoData = [];

    fetch('photos.csv')
        .then(response => response.text())
        .then(data => {
            const rows = data.split('\n').slice(1);
            photoData = rows.map(row => row.split(','));
            renderPhotos();
        })
        .catch(error => console.error('读取 CSV 文件失败:', error));

    function renderPhotos() {
        const photoGrid = document.getElementById('photo-grid');
        photoGrid.innerHTML = '';

        const start = (currentPage - 1) * photosPerPage;
        const end = start + photosPerPage;
        const currentPhotos = photoData.slice(start, end);

        currentPhotos.forEach(([id, link]) => {
            const imgElement = document.createElement('img');
            imgElement.src = `https://drive.google.com/thumbnail?id=${id}&sz=w800`;
            imgElement.className = 'photo';

            imgElement.onerror = () => {
                console.error(`无法加载图片: ${imgElement.src}`);
                imgElement.alt = '图片无法显示';
            };

            imgElement.onclick = () => {
                document.getElementById('modal-img').src = imgElement.src;
                document.getElementById('download-link').href = link;
                document.getElementById('modal').style.display = 'flex';
            };
            photoGrid.appendChild(imgElement);
        });

        document.getElementById('prev-btn').disabled = currentPage === 1;
        document.getElementById('next-btn').disabled = end >= photoData.length;
        document.getElementById('page-info').innerText = `第 ${currentPage} 頁 / 共 ${Math.ceil(photoData.length / photosPerPage)} 頁`;
    }

    document.getElementById('prev-btn').onclick = () => {
        if (currentPage > 1) {
            currentPage--;
            renderPhotos();
        }
    };

    document.getElementById('next-btn').onclick = () => {
        if ((currentPage - 1) * photosPerPage + photosPerPage < photoData.length) {
            currentPage++;
            renderPhotos();
        }
    };

    document.getElementById('modal').onclick = () => {
        document.getElementById('modal').style.display = 'none';
    };
</script>

</body>
</html>
