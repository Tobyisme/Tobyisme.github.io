<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分組頁面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="logo.png" alt="Logo" class="logo" />
      <p>ZSGA 畢聯會</p>
    </div>
    <button id="createGroupBtn">建立分組</button>
    
    <div id="groupContainer" class="group-container">
      <!-- 動態生成分組卡片 -->
    </div>
    <p id="kkl">需要刪除組別，聯繫宥任。</p>
  </div>

  <!-- 建立分組彈窗 -->
  <div id="createGroupModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" id="closeCreateGroupModal">×</span>
      <h2>建立分組</h2>
      <label for="groupName">組別名稱:</label>
      <input type="text" id="groupName" placeholder="輸入組別名稱">
      <label for="skill">擅長項目:</label>
      <input type="text" id="skill" placeholder="輸入擅長項目">
      <label for="className">班級:</label>
      <input type="text" id="className" placeholder="輸入班級">
      <label for="studentName">姓名:</label>
      <input type="text" id="studentName" placeholder="輸入姓名">
      <label for="groupCode">組別代碼:</label>
      <input type="text" id="groupCode" placeholder="輸入組別代碼">
      <button id="createGroupConfirmBtn">確認</button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
  
  <!-- 引入 JavaScript -->
  <script src="script.js"></script>
</body>
</html>
