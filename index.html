<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宥任</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="title-section">
                <h1> 宥任</h1>
            </div>
        </div>
    </header>

    <main>
        <div id="thumbnails-container" class="thumbnails-grid"></div>
    </main>
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div class="modal-controls">
                <button id="prev-page" class="control-btn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span class="page-info">第 <span id="current-page">0</span> 頁，共 <span id="total-pages">0</span> 頁</span>
                <button id="next-page" class="control-btn">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="modal-body">
                <canvas id="pdf-viewer"></canvas>
            </div>
        </div>
    </div>

    <div id="loading-indicator" class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        載入中...
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
